name: Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed base-devel git nodejs npm rust pnpm
          useradd -m builduser
          chown -R builduser:builduser .
          echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build package
        run: |
          chown -R builduser:builduser .
          sudo -u builduser makepkg -sf --noconfirm
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: "*.pkg.tar.zst"

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri App
        run: pnpm tauri build --no-bundle
      - name: Rename executable
        run: mv src-tauri/target/release/ipad.exe note-app-windows.exe
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: note-app-windows.exe

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true
      - name: Create Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Continuous Build"
          body: "This release contains the latest automated builds from the main branch."
          prerelease: true
          files: |
            ./artifacts/*.pkg.tar.zst
            ./artifacts/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
